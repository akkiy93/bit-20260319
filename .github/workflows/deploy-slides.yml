name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'slides/presentation.md'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build HTML from Markdown
        run: |
          marp slides/presentation.md --output slides/presentation.html --no-stdin
          cp slides/presentation.html index.html

      - name: Commit and push generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slides/presentation.html index.html
          git diff --staged --quiet || git commit -m "Auto-generate slides [skip ci]"
          git push
